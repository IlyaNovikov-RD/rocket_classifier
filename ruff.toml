line-length = 100
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in default arguments
    "N803",  # ML convention: uppercase X for feature matrix (sklearn standard)
    "N806",  # ML convention: uppercase X_train, X_test, X_vals in function scope
]

[lint.isort]
known-first-party = ["features", "model"]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
