line-length = 100
target-version = "py312"
exclude = [
    ".venv/",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade — flags pre-3.12 patterns automatically
    "N",   # pep8-naming
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in default arguments
    "N803",  # ML convention: uppercase X for feature matrix (sklearn standard)
    "N806",  # ML convention: uppercase X_train, X_test, X_vals in function scope
    "C408",  # Plotly API uses dict() heavily — dict() is more readable than {} for kwargs
]

[lint.isort]
known-first-party = ["rocket_classifier"]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
