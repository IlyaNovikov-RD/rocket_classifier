[tool.poetry]
name = "rocket-classifier"
version = "0.1.0"
description = "Production-grade rocket trajectory classifier"
authors = ["Data Engineer"]
package-mode = false

[tool.poetry.dependencies]
python = "^3.11"
pandas = "^2.0"
numpy = "^1.24"
scikit-learn = "^1.3"
xgboost = "^2.0"
pyarrow = "^14.0"
matplotlib = "^3.7"
streamlit = ">=1.35"
plotly = ">=5.20"
shap = ">=0.44,<0.51"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest (>=9.0.2,<10.0.0)",
    "ruff (>=0.15.7,<0.16.0)"
]
