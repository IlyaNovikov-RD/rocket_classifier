name: Post-Release Pipeline

# Triggers automatically when a new GitHub Release is published.
# Automates everything that can be automated after a model is deployed:
#   1. Download model artifacts + feature caches from the release
#   2. Run inference pipeline → submission.csv
#   3. Run interpretability analysis → SHAP plot + report
#   4. Upload submission.csv to the release assets
#   5. Commit updated assets/ back to main
#
# The only step that requires a human: publishing the GitHub Release.

on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

jobs:
  pipeline:
    name: Inference + Interpretability
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit assets back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Download model artifacts + feature caches
        run: uv run python scripts/download_weights.py --with-caches

      - name: Download sample_submission.csv
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          gh release download --pattern "sample_submission.csv" --dir data

      - name: Run inference pipeline
        run: uv run python -m rocket_classifier.main

      - name: Run interpretability analysis
        run: uv run python research/interpret.py

      - name: Upload submission.csv to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Fall back to the latest release tag when triggered via workflow_dispatch
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          fi
          # Remove old submission.csv from release if it exists, then re-upload
          gh release delete-asset "$TAG" submission.csv --yes 2>/dev/null || true
          gh release upload "$TAG" outputs/submission.csv

      - name: Commit updated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            docs: regenerate artifacts after ${{ github.event.release.tag_name }} release [skip ci]

            - assets/shap_summary.png (SHAP feature importance)
            - assets/interpretation_report.txt (ranked feature report)
          file_pattern: "assets/shap_summary.png assets/interpretation_report.txt"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
