name: Post-Release Pipeline

# Triggers automatically when a new GitHub Release is published.
# Automates everything that can be automated after a model is deployed:
#   1. Download model artifacts + feature caches from the release
#   2. Re-export model.lgb → model.onnx + model_opt.onnx (verifies release artifacts)
#   3. Run inference pipeline → submission.csv
#   4. Run interpretability analysis → SHAP plot + report
#   5. Upload submission.csv, model.onnx, model_opt.onnx, and SHAP assets to the release
#
# All generated artifacts are uploaded to the release — no direct push to main.
# The only step that requires a human: publishing the GitHub Release.

on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

concurrency:
  group: release-update
  cancel-in-progress: false

jobs:
  pipeline:
    name: Inference + Interpretability
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload release assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group research

      - name: Download model artifacts + feature caches
        run: uv run python scripts/download_models.py --with-caches

      - name: Export model.lgb → model.onnx + model_opt.onnx
        run: |
          uv pip install -q onnxmltools skl2onnx
          uv run python scripts/export_fast_models.py

      - name: Upload model.onnx and model_opt.onnx to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          fi
          gh release delete-asset "$TAG" model.onnx --yes 2>/dev/null || true
          gh release upload "$TAG" models/model.onnx
          gh release delete-asset "$TAG" model_opt.onnx --yes 2>/dev/null || true
          gh release upload "$TAG" models/model_opt.onnx

      - name: Run inference pipeline
        run: uv run python -m rocket_classifier.main

      - name: Run interpretability analysis
        run: uv run python research/interpret.py

      - name: Upload submission.csv to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Fall back to the latest release tag when triggered via workflow_dispatch
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          fi
          # Remove old submission.csv from release if it exists, then re-upload
          gh release delete-asset "$TAG" submission.csv --yes 2>/dev/null || true
          gh release upload "$TAG" outputs/submission.csv

      - name: Upload SHAP assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          fi
          gh release delete-asset "$TAG" shap_summary.png --yes 2>/dev/null || true
          gh release delete-asset "$TAG" interpretation_report.txt --yes 2>/dev/null || true
          gh release upload "$TAG" assets/shap_summary.png assets/interpretation_report.txt
