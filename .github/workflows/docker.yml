name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        run: docker build -t rocket_classifier .

      - name: Smoke test — container starts and validates artifacts
        run: |
          docker run --rm rocket_classifier \
            uv run python -c "
          import numpy as np
          from pathlib import Path
          from rocket_classifier.model import RocketClassifier, SELECTED_FEATURES, PRODUCTION_BIASES
          assert len(SELECTED_FEATURES) == 32
          assert PRODUCTION_BIASES.shape == (3,)
          # Verify model artifacts were downloaded during build
          models = Path('/app/artifacts')
          assert (models / 'model.lgb').exists(), 'model.lgb not found'
          assert (models / 'train_medians.npy').exists(), 'train_medians.npy not found'
          assert (models / 'threshold_biases.npy').exists(), 'threshold_biases.npy not found'
          # Dummy inference: verify model loads and produces correct output shape
          clf = RocketClassifier.from_artifacts(
              model_path=models / 'model.lgb',
              medians_path=models / 'train_medians.npy',
              biases_path=models / 'threshold_biases.npy',
          )
          dummy = np.zeros((2, 32), dtype=np.float32)
          preds = clf.predict(dummy)
          assert preds.shape == (2,), f'Expected shape (2,), got {preds.shape}'
          assert set(preds).issubset({0, 1, 2}), f'Unexpected labels: {set(preds)}'
          print('Model package imports OK')
          print(f'  SELECTED_FEATURES: {len(SELECTED_FEATURES)} features')
          print(f'  PRODUCTION_BIASES: {PRODUCTION_BIASES.tolist()}')
          print(f'  model.lgb: {(models / \"model.lgb\").stat().st_size} bytes')
          print(f'  Dummy inference: preds={preds.tolist()} — OK')
          "
